name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    name: Quality gates
    # Execute the full matrix (Ubuntu and Windows) utilizing the default inputs of the reusable workflow.
    uses: ./.github/workflows/quality.yml
