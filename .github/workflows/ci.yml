name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality gates
    # Full matrix: ubuntu + windows (default inputs of the reusable workflow).
    uses: ./.github/workflows/quality.yml
