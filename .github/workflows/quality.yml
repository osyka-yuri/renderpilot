name: Quality gates

# Reusable workflow: the single source of truth for RenderPilot's quality gates.
# Called by ci.yml (ubuntu + windows) and release.yml (windows only) so the
# checks that guard `main` and the checks that guard a release can never drift.
on:
  workflow_call:
    inputs:
      rust-os:
        description: JSON array of runner OSes for the Rust matrix.
        type: string
        default: '["ubuntu-latest", "windows-latest"]'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(inputs.rust-os) }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Tauri's Linux build needs WebKitGTK et al.; Windows ships WebView2.
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config

      # Installs the toolchain + rustfmt/clippy pinned in rust-toolchain.toml.
      - name: Install Rust toolchain
        run: rustup show

      - name: Cache Rust build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.os }}

      # Formatting is OS-independent, so check it once on the Linux leg.
      - name: Check formatting
        if: runner.os == 'Linux'
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Run tests
        run: cargo test --workspace --locked

  desktop:
    name: Desktop UI
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: apps/desktop

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting (Prettier)
        run: pnpm run format:check

      - name: Lint (ESLint)
        run: pnpm run lint

      - name: Run tests (Vitest)
        run: pnpm test

      - name: Build (svelte-check + Vite)
        run: pnpm run build
