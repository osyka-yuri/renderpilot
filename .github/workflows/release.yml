name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false # Ensures that an in-flight publish operation is never aborted by subsequent commits.

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Gate the release on the same quality checks utilized in the CI pipeline, targeting the deployment platform.
  quality:
    name: Quality gates
    uses: ./.github/workflows/quality.yml
    with:
      rust-os: '["windows-latest"]'

  release:
    name: Build and publish
    needs: quality
    permissions:
      contents: write
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      # Install the Rust toolchain as specified in `rust-toolchain.toml`.
      - name: Install Rust toolchain
        run: rustup show

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile

      # Note: `tauri-action` executes the frontend build via its `beforeBuildCommand`.
      - name: Extract Changelog
        id: changelog
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $changelog = Get-Content CHANGELOG.md -Raw
          $pattern = "(?s)## \[$version\].*?(?=(?:`r?`n## \[)|$)"
          if ($changelog -match $pattern) {
            $body = $matches[0].Trim()
          } else {
            $body = "See the assets to download this version and install."
          }
          "body<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $body | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build and create release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: v__VERSION__
          releaseName: 'RenderPilot v__VERSION__'
          releaseBody: ${{ steps.changelog.outputs.body }}
          releaseDraft: true
          prerelease: false

      # Build the portable exe via the Tauri CLI so that TAURI_ENV_DEBUG and
      # other required env vars are set correctly — plain `cargo build` skips
      # this and leaves Tauri in dev mode, causing "page not found" at runtime.
      # The config is written to a file first to avoid PowerShell stripping
      # double quotes when passing inline JSON through pnpm to the Tauri CLI.
      - name: Build portable exe
        working-directory: apps/desktop
        shell: pwsh
        run: |
          '{"bundle":{"active":false}}' | Set-Content -Path portable-config.json -Encoding utf8
          pnpm tauri build --features portable --config portable-config.json
          Remove-Item portable-config.json
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Read app version
        id: version
        shell: pwsh
        run: |
          $v = (Get-Content apps/desktop/src-tauri/tauri.conf.json | ConvertFrom-Json).version
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Package portable zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path RenderPilot
          Copy-Item target\release\renderpilot-desktop.exe RenderPilot\renderpilot-desktop.exe
          Compress-Archive -Path RenderPilot -DestinationPath "RenderPilot-${{ steps.version.outputs.version }}-portable.zip"

      - name: Upload portable zip to release
        run: gh release upload ${{ github.ref_name }} "RenderPilot-${{ steps.version.outputs.version }}-portable.zip"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
