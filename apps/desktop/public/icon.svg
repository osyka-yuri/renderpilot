<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="1024" height="1024">
  <defs>
    <!-- Flat app background (dark mode surface) -->
    <linearGradient id="base-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#262628"/>
      <stop offset="100%" stop-color="#1A1A1C"/>
    </linearGradient>

    <!-- App border color (subtle white border) -->
    <linearGradient id="base-rim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.05"/>
    </linearGradient>

    <filter id="base-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <clipPath id="squircle-clip">
      <rect x="56" y="56" width="400" height="400" rx="90" ry="90"/>
    </clipPath>
  </defs>

  <!-- Background Squircle -->
  <rect x="56" y="56" width="400" height="400" rx="90" ry="90" fill="url(#base-grad)" filter="url(#base-shadow)"/>
  
  <!-- Subtle inner border (matches UI app border) -->
  <rect x="57" y="57" width="398" height="398" rx="89" ry="89" fill="none" stroke="url(#base-rim)" stroke-width="2"/>

  <!-- Clean, flat R without any glow -->
  <g id="letter-R">
    <path fill-rule="evenodd" d="
      M 180 150
      H 270
      C 320 150 350 180 350 220
      C 350 250 330 275 290 285
      L 350 370
      H 305
      L 245 290
      H 220
      V 370
      H 180
      Z
      M 220 190
      V 250
      H 270
      C 295 250 310 240 310 220
      C 310 200 295 190 270 190
      Z" 
      fill="#FAFAFA"/>
  </g>
</svg>
